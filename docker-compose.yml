services:
  app:
    build: .
    restart: unless-stopped
    environment:
      - PORT=3000
      - DB_PATH=/data/products.db
    volumes:
      - ./data:/data
    networks:
      - internal

  cloudflared:
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    command: tunnel --no-autoupdate run
    environment:
      - TUNNEL_TOKEN=${CLOUDFLARE_TUNNEL_TOKEN}
    depends_on:
      - app
    networks:
      - internal

networks:
  internal:
    driver: bridge
